name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::462355914183:role/elderpinq-dev-github-actions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: elderpinq-dev-notes-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: AWS-Elderping/elderping-gitops
          token: ${{ secrets.GITOPS_PAT }}
          ref: main
          path: gitops-repo

      - name: Setup yq
        uses: mikefarah/yq@v4.44.2

      - name: Update Dev Image Tag in GitOps
        run: |
          yq e -i ".image.tag = \"${{ github.sha }}\"" gitops-repo/environments/dev/notes-service-values.yaml

      - name: Commit and Push GitOps
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/dev/notes-service-values.yaml
          if git diff --staged --quiet; then
            echo "No changes to deploy (image tag already up to date)."
          else
            git commit -m "deploy: update notes-service image to ${{ github.sha }}"
            git push origin main
